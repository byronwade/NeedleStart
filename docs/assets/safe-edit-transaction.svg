<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Lumina safe edit transaction</title>
  <desc id="desc">A professional process diagram showing a validated edit moving through preview, graph update, affected checks, mutation log, and rollback.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.card{fill:#fff;stroke:#dbe4ee;stroke-width:1.5}.soft{fill:#f8fafc;stroke:#e2e8f0}.title{font:700 34px -apple-system,BlinkMacSystemFont,Segoe UI,Inter,Arial,sans-serif;fill:#0f172a}.sub{font:400 16px -apple-system,BlinkMacSystemFont,Segoe UI,Inter,Arial,sans-serif;fill:#475569}.h{font:700 15px -apple-system,BlinkMacSystemFont,Segoe UI,Inter,Arial,sans-serif;fill:#0f172a}.t{font:500 12.5px -apple-system,BlinkMacSystemFont,Segoe UI,Inter,Arial,sans-serif;fill:#334155}.small{font:500 12px -apple-system,BlinkMacSystemFont,Segoe UI,Inter,Arial,sans-serif;fill:#64748b}.code{font:500 12px SFMono-Regular,Consolas,Menlo,monospace;fill:#334155}.green{fill:#059669}.amber{fill:#b45309}.blue{fill:#2563eb}.line{stroke:#2563eb;stroke-width:2.5;fill:none}.shadow{filter:url(#shadow)}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/></marker>
  </defs>
  <rect class="bg" width="1200" height="675" rx="28"/>
  <text class="title" x="60" y="62">Safe edits are transactions</text>
  <text class="sub" x="60" y="92">Changes are previewed, graph-aware, checked, logged, and reversible.</text>

  <g transform="translate(55,145)">
    <rect class="card shadow" x="0" y="0" width="128" height="148" rx="16"/>
    <circle cx="28" cy="30" r="14" fill="#eef6ff" stroke="#bfdbfe"/><text class="h" x="23" y="35">1</text>
    <text class="h" x="20" y="68">Request</text><text class="small" x="20" y="92">structured goal</text><text class="small" x="20" y="112">route target</text>
  </g>
  <g transform="translate(198,145)">
    <rect class="card shadow" x="0" y="0" width="128" height="148" rx="16"/>
    <circle cx="28" cy="30" r="14" fill="#eef6ff" stroke="#bfdbfe"/><text class="h" x="23" y="35">2</text>
    <text class="h" x="20" y="68">Validate</text><text class="small" x="20" y="92">target exists</text><text class="small" x="20" y="112">field allowed</text>
  </g>
  <g transform="translate(341,145)">
    <rect class="card shadow" x="0" y="0" width="128" height="148" rx="16"/>
    <circle cx="28" cy="30" r="14" fill="#ecfdf5" stroke="#bbf7d0"/><text class="h" x="23" y="35">3</text>
    <text class="h" x="20" y="68">Preview</text><text class="small" x="20" y="92">dry-run diff</text><text class="small" x="20" y="112">no file write</text>
  </g>
  <g transform="translate(484,145)">
    <rect class="card shadow" x="0" y="0" width="128" height="148" rx="16"/>
    <circle cx="28" cy="30" r="14" fill="#eef6ff" stroke="#bfdbfe"/><text class="h" x="23" y="35">4</text>
    <text class="h" x="20" y="68">Graph slice</text><text class="small" x="20" y="92">affected nodes</text><text class="small" x="20" y="112">changed edges</text>
  </g>
  <g transform="translate(627,145)">
    <rect class="card shadow" x="0" y="0" width="128" height="148" rx="16"/>
    <circle cx="28" cy="30" r="14" fill="#fefce8" stroke="#fde68a"/><text class="h" x="23" y="35">5</text>
    <text class="h" x="20" y="68">Checks</text><text class="small" x="20" y="92">types, tests</text><text class="small" x="20" y="112">seo, cache</text>
  </g>
  <g transform="translate(770,145)">
    <rect class="card shadow" x="0" y="0" width="128" height="148" rx="16"/>
    <circle cx="28" cy="30" r="14" fill="#ecfdf5" stroke="#bbf7d0"/><text class="h" x="23" y="35">6</text>
    <text class="h" x="20" y="68">Apply</text><text class="small" x="20" y="92">AST patch</text><text class="small" x="20" y="112">format files</text>
  </g>
  <g transform="translate(913,145)">
    <rect class="card shadow" x="0" y="0" width="128" height="148" rx="16"/>
    <circle cx="28" cy="30" r="14" fill="#eef6ff" stroke="#bfdbfe"/><text class="h" x="23" y="35">7</text>
    <text class="h" x="20" y="68">Log</text><text class="small" x="20" y="92">mutation id</text><text class="small" x="20" y="112">who, what, why</text>
  </g>
  <g transform="translate(1056,145)">
    <rect class="card shadow" x="0" y="0" width="88" height="148" rx="16"/>
    <circle cx="28" cy="30" r="14" fill="#f8fafc" stroke="#e2e8f0"/><text class="h" x="23" y="35">8</text>
    <text class="h" x="20" y="68">Undo</text><text class="small" x="20" y="92">rollback</text>
  </g>

  <path class="line" marker-end="url(#arrow)" d="M183 219 H198"/>
  <path class="line" marker-end="url(#arrow)" d="M326 219 H341"/>
  <path class="line" marker-end="url(#arrow)" d="M469 219 H484"/>
  <path class="line" marker-end="url(#arrow)" d="M612 219 H627"/>
  <path class="line" marker-end="url(#arrow)" d="M755 219 H770"/>
  <path class="line" marker-end="url(#arrow)" d="M898 219 H913"/>
  <path class="line" marker-end="url(#arrow)" d="M1041 219 H1056"/>

  <rect class="card shadow" x="70" y="385" width="260" height="168" rx="18"/>
  <text class="h" x="98" y="420">Risk tier</text>
  <rect x="98" y="444" width="82" height="34" rx="9" fill="#fef3c7" stroke="#fde68a"/><text class="h" x="113" y="467">medium</text>
  <text class="small" x="98" y="505">Reason: cache TTL changes</text>
  <text class="small" x="98" y="526">Review required before apply</text>

  <rect class="card shadow" x="380" y="385" width="260" height="168" rx="18"/>
  <text class="h" x="408" y="420">Affected scope</text>
  <text class="t" x="408" y="452">3 routes</text>
  <text class="t" x="408" y="478">6 tests</text>
  <text class="t" x="408" y="504">1 owner</text>
  <text class="small" x="408" y="530">from .lumina/map.json</text>

  <rect class="card shadow" x="690" y="385" width="260" height="168" rx="18"/>
  <text class="h" x="718" y="420">Check result</text>
  <rect x="718" y="444" width="60" height="34" rx="9" fill="#ecfdf5" stroke="#bbf7d0"/><text class="t" x="733" y="466">12 pass</text>
  <rect x="790" y="444" width="60" height="34" rx="9" fill="#fefce8" stroke="#fde68a"/><text class="t" x="807" y="466">2 warn</text>
  <rect x="862" y="444" width="60" height="34" rx="9" fill="#eef6ff" stroke="#bfdbfe"/><text class="t" x="879" y="466">1 review</text>
  <text class="small" x="718" y="526">Result is returned as stable JSON.</text>

  <text class="code" x="70" y="612">$ lumina edit route /pricing --set meta.title="Pricing | Acme" --dry-run</text>
</svg>
