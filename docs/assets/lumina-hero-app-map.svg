<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lumina hero app map</title>
  <desc id="desc">A luminous application graph showing routes, components, APIs, SEO, cache plans, tests, agents, and safe edit boundaries connected through the Lumina Map.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#4F8CFF" stop-opacity="0.22"/>
      <stop offset="40%" stop-color="#7C5CFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#060812" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="240" y1="86" x2="1200" y2="816" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172033" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#090D17" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="strokeA" x1="277" y1="205" x2="1167" y2="674" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8AB4FF"/>
      <stop offset="0.45" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </linearGradient>
    <linearGradient id="routeLine" x1="248" y1="282" x2="1164" y2="617" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA" stop-opacity="0.08"/>
      <stop offset="0.5" stop-color="#C4B5FD" stop-opacity="0.66"/>
      <stop offset="1" stop-color="#5EEAD4" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#060A12"/>
    </linearGradient>
    <filter id="softShadow" x="160" y="42" width="1120" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="42" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#8BA3C7" stroke-opacity="0.06"/>
    </pattern>
    <style>
      .small{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;letter-spacing:.02em;fill:#AAB7CF}
      .tiny{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11px;letter-spacing:.04em;fill:#7F8DA8;text-transform:uppercase}
      .label{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;font-weight:650;fill:#F4F7FB}
      .mono{font-family:'SFMono-Regular','Cascadia Code','Roboto Mono',Consolas,monospace;font-size:12px;fill:#BBD2FF}
      .headline{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:54px;font-weight:760;letter-spacing:-.055em;fill:#F7FAFF}
      .subhead{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:18px;line-height:1.4;fill:#AAB7CF}
      .line{stroke:url(#routeLine);stroke-width:1.35;stroke-linecap:round}
      .dash{stroke-dasharray:7 12}
      .cardStroke{stroke:#DCE7FF;stroke-opacity:.1}
    </style>
  </defs>

  <rect width="1440" height="900" fill="#050711"/>
  <rect width="1440" height="900" fill="url(#bgGlow)"/>
  <rect width="1440" height="900" fill="url(#grid)" opacity="0.9"/>
  <path d="M133 732C366 667 430 793 663 734C927 667 975 463 1301 535" stroke="#BFD4FF" stroke-opacity="0.08" stroke-width="2"/>
  <path d="M74 219C295 315 478 129 696 220C915 311 1052 156 1352 230" stroke="#5EEAD4" stroke-opacity="0.08" stroke-width="2"/>

  <g filter="url(#softShadow)">
    <rect x="206" y="78" width="1028" height="744" rx="36" fill="url(#panel)" stroke="url(#strokeA)" stroke-opacity="0.36"/>
    <rect x="224" y="96" width="992" height="708" rx="27" fill="#070B14" stroke="#FFFFFF" stroke-opacity="0.06"/>
    <rect x="224" y="96" width="992" height="56" rx="27" fill="#111827" fill-opacity="0.72"/>
    <circle cx="260" cy="124" r="6" fill="#EF4444" fill-opacity="0.82"/>
    <circle cx="282" cy="124" r="6" fill="#F59E0B" fill-opacity="0.82"/>
    <circle cx="304" cy="124" r="6" fill="#22C55E" fill-opacity="0.82"/>
    <text x="340" y="130" class="mono">.lumina/map.json</text>
    <rect x="1054" y="111" width="135" height="26" rx="13" fill="#0B1220" stroke="#C4B5FD" stroke-opacity="0.22"/>
    <circle cx="1071" cy="124" r="4" fill="#5EEAD4" filter="url(#nodeGlow)"/>
    <text x="1083" y="129" class="tiny">map online</text>
  </g>

  <g opacity="0.92">
    <path class="line" d="M392 318C509 249 622 252 720 450"/>
    <path class="line" d="M392 318C466 429 558 511 720 450"/>
    <path class="line" d="M720 450C859 316 977 305 1073 352"/>
    <path class="line" d="M720 450C845 446 969 491 1064 584"/>
    <path class="line dash" d="M720 450C725 331 703 257 654 216"/>
    <path class="line dash" d="M720 450C636 615 512 672 364 648"/>
    <path class="line dash" d="M720 450C794 617 897 681 1026 668"/>
    <path class="line" d="M392 318C614 154 874 151 1073 352" opacity="0.42"/>
    <path class="line" d="M364 648C546 737 844 744 1026 668" opacity="0.38"/>
  </g>

  <g transform="translate(514 294)">
    <circle cx="206" cy="156" r="118" fill="#101827" stroke="url(#strokeA)" stroke-width="1.5" stroke-opacity="0.72"/>
    <circle cx="206" cy="156" r="84" fill="#0B1020" stroke="#A78BFA" stroke-opacity="0.18"/>
    <circle cx="206" cy="156" r="44" fill="#101B2D" stroke="#5EEAD4" stroke-opacity="0.38"/>
    <circle cx="206" cy="156" r="9" fill="#F7FAFF" filter="url(#nodeGlow)"/>
    <text x="206" y="137" text-anchor="middle" class="tiny">lumina</text>
    <text x="206" y="165" text-anchor="middle" class="headline" style="font-size:30px;letter-spacing:-.04em">Map</text>
    <text x="206" y="195" text-anchor="middle" class="small">single source of app truth</text>
    <path d="M88 155H20M392 155h-68M205 38V0M206 312v-54" stroke="#BFD4FF" stroke-opacity="0.18"/>
  </g>

  <g transform="translate(286 248)">
    <rect width="214" height="126" rx="22" fill="url(#chipGrad)" stroke="#60A5FA" stroke-opacity="0.35"/>
    <text x="24" y="34" class="tiny">routes</text>
    <text x="24" y="64" class="label">/app pages</text>
    <text x="24" y="92" class="mono">static • ssr • stream</text>
    <circle cx="184" cy="32" r="9" fill="#60A5FA" filter="url(#nodeGlow)"/>
  </g>

  <g transform="translate(532 164)">
    <rect width="244" height="104" rx="22" fill="url(#chipGrad)" stroke="#A78BFA" stroke-opacity="0.35"/>
    <text x="24" y="32" class="tiny">compiler</text>
    <text x="24" y="62" class="label">reasoning layer</text>
    <text x="24" y="86" class="mono">why route renders</text>
    <circle cx="214" cy="30" r="9" fill="#A78BFA" filter="url(#nodeGlow)"/>
  </g>

  <g transform="translate(945 282)">
    <rect width="226" height="136" rx="22" fill="url(#chipGrad)" stroke="#5EEAD4" stroke-opacity="0.35"/>
    <text x="24" y="34" class="tiny">seo surface</text>
    <text x="24" y="64" class="label">public HTML</text>
    <text x="24" y="92" class="mono">metadata • sitemap</text>
    <text x="24" y="114" class="mono">structured data</text>
    <circle cx="196" cy="32" r="9" fill="#5EEAD4" filter="url(#nodeGlow)"/>
  </g>

  <g transform="translate(940 524)">
    <rect width="232" height="134" rx="22" fill="url(#chipGrad)" stroke="#F0ABFC" stroke-opacity="0.34"/>
    <text x="24" y="34" class="tiny">agent contract</text>
    <text x="24" y="64" class="label">safe edit zone</text>
    <text x="24" y="92" class="mono">preview • check • undo</text>
    <text x="24" y="114" class="mono">MCP readable</text>
    <circle cx="202" cy="32" r="9" fill="#F0ABFC" filter="url(#nodeGlow)"/>
  </g>

  <g transform="translate(266 578)">
    <rect width="224" height="116" rx="22" fill="url(#chipGrad)" stroke="#93C5FD" stroke-opacity="0.34"/>
    <text x="24" y="34" class="tiny">affected graph</text>
    <text x="24" y="64" class="label">what changes?</text>
    <text x="24" y="92" class="mono">tests • owners • risk</text>
    <circle cx="194" cy="32" r="9" fill="#93C5FD" filter="url(#nodeGlow)"/>
  </g>

  <g transform="translate(887 648)">
    <rect width="202" height="84" rx="20" fill="#09111F" stroke="#5EEAD4" stroke-opacity="0.22"/>
    <text x="22" y="34" class="tiny">hot path</text>
    <text x="22" y="61" class="mono">apiHot() + cache tags</text>
  </g>

  <g transform="translate(330 706)">
    <rect width="780" height="54" rx="18" fill="#090F1B" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <text x="28" y="34" class="mono">lumina inspect why /pricing → route, render mode, SEO, cache, related files, tests, owners</text>
  </g>

  <g transform="translate(262 776)">
    <rect width="916" height="1" fill="url(#strokeA)" opacity="0.48"/>
  </g>

  <g transform="translate(260 192)">
    <text x="0" y="0" class="tiny">hero concept</text>
    <text x="0" y="54" class="headline">Your app ships with a map.</text>
    <text x="3" y="88" class="subhead">Routes, components, APIs, SEO, cache plans, tests, risk, and agents all reading from one illuminated app graph.</text>
  </g>

  <g opacity="0.72">
    <circle cx="238" cy="198" r="2" fill="#BFD4FF"/>
    <circle cx="1168" cy="214" r="2" fill="#5EEAD4"/>
    <circle cx="1240" cy="694" r="2" fill="#A78BFA"/>
    <circle cx="185" cy="638" r="2" fill="#60A5FA"/>
    <circle cx="700" cy="814" r="2" fill="#F0ABFC"/>
  </g>
</svg>
