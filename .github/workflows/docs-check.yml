name: Docs Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - "CODEOWNERS"
      - ".github/**"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "CODEOWNERS"
      - ".github/**"

jobs:
  docs-smoke:
    name: Markdown smoke check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check markdown files
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t files < <(git ls-files '*.md')

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No markdown files found."
            exit 0
          fi

          echo "Checking for merge conflict markers..."
          if grep -nE '^(<<<<<<<|=======|>>>>>>>)' "${files[@]}"; then
            echo "Merge conflict markers found."
            exit 1
          fi

          echo "Checking local markdown links..."
          python - <<'PY'
          from __future__ import annotations

          import os
          import re
          import sys
          from pathlib import Path

          files = [Path(line.strip()) for line in os.popen("git ls-files '*.md'").read().splitlines()]
          link_re = re.compile(r"\[[^\]]+\]\(([^)]+)\)")
          missing: list[str] = []

          for file in files:
              text = file.read_text(encoding="utf-8")
              for match in link_re.finditer(text):
                  target = match.group(1).strip()
                  if not target or target.startswith(("http://", "https://", "mailto:", "#")):
                      continue
                  if target.startswith("sandbox:"):
                      continue
                  target = target.split("#", 1)[0]
                  if not target:
                      continue
                  if target.startswith("<") and target.endswith(">"):
                      continue
                  resolved = (file.parent / target).resolve()
                  repo = Path.cwd().resolve()
                  try:
                      resolved.relative_to(repo)
                  except ValueError:
                      missing.append(f"{file}: link escapes repo: {target}")
                      continue
                  if not resolved.exists():
                      missing.append(f"{file}: missing local link: {target}")

          if missing:
              print("\n".join(missing))
              sys.exit(1)

          print("Markdown local links look good.")
          PY
